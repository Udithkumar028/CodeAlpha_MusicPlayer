<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">
    <h1 class="main-heading">My Music Player</h1>

    <div class="music-player">

      <img id="cover" src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1200&auto=format&fit=crop" alt="Song Cover">

      <div class="song-details">
        <h2 id="title">Night Drive</h2>
        <p id="artist">Alex Parker</p>
      </div>

      <div class="progress-container" id="progressContainer">
        <div class="progress" id="progress"></div>
      </div>

      <div class="time-info">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>

      <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
      </div>

      <div class="volume-section">
        <label>Volume</label>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.7">
      </div>

    </div>

    <div class="playlist-section">
      <h3>Playlist</h3>

      <div class="playlist" id="playlist">

      </div>
    </div>
  </div>

  <audio id="audio"></audio>

  <script src="script.js"></script>
</body>
</html>
